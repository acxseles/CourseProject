services:
  mysql:
    image: mysql:8.0
    container_name: school-swedish-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - school-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      timeout: 20s
      retries: 10
      interval: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: school-swedish-backend
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=school-swedish-mysql;Port=3307;Database=school_swedish;User=root;Password=root;
      - ConnectionStrings:DefaultConnection=Server=school-swedish-mysql;Port=3307;Database=school_swedish;User=root;Password=root;
      - JWT__Secret=super-secret-key-minimum-64-characters-long-for-jwt-security-1234567890
      - JWT__Issuer=school-swedish-api
      - JWT__Audience=school-swedish-client
    ports:
      - "5000:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - school-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: school-swedish-frontend
    restart: always
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://backend:5000/api
    depends_on:
      - backend
    networks:
      - school-network

volumes:
  mysql_data:

networks:
  school-network:
    driver: bridge
